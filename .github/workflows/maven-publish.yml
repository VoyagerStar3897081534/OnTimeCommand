# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on:
  schedule:
    - cron: '30 18 * * 0-6'
    - cron: '30 6 * * 0-6'

  push:
    paths:
      - '!.idea/**'
      - '!dependency-reduced-pom.xml'

  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Delete existing package version
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ontimecommand
        run: |
          PACKAGE_VERSION=$(grep -oP '<version>\K[^<]+' pom.xml | head -1)
          echo "Current version: $PACKAGE_VERSION"
          
          VERSION_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/users/VoyagerStar3897081534/packages/maven/$PACKAGE_NAME/versions?version=$PACKAGE_VERSION" \
            | jq -r '.[0].id')
          
          if [ "$VERSION_ID" != "null" ] && [ ! -z "$VERSION_ID" ]; then
            echo "Deleting existing package version: $PACKAGE_VERSION (ID: $VERSION_ID)"
            curl -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/users/VoyagerStar3897081534/packages/maven/$PACKAGE_NAME/versions/$VERSION_ID"
            echo "Package version deleted successfully"
          else
            echo "No existing package version found for $PACKAGE_VERSION"
          fi

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Publish to GitHub Packages Apache Maven
        run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
        env:
          GITHUB_TOKEN: ${{ github.token }}
