# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on:
  schedule:
    - cron: '30 18 * * 0-6'
    - cron: '30 6 * * 0-6'

  push:

  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Extract version from pom.xml
        if: github.event_name == 'push'
        id: get-version
        run: |
          VERSION=$(grep -oP '<version>\K[^<]+' pom.xml | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Publish to GitHub Packages Apache Maven
        if: github.event_name == 'push'
        run: |
          echo "Attempting to deploy version ${{ steps.get-version.outputs.version }}..."
          mvn deploy -s $GITHUB_WORKSPACE/settings.xml || {
            echo "⚠️ Deployment failed (likely version already exists). This is expected for duplicate versions."
            echo "If you want to redeploy, please increment the version number in pom.xml"
            exit 0
          }
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create Git Tag and Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-version.outputs.version }}
          name: Release ${{ steps.get-version.outputs.version }}
          body: |
            ## Changes in version ${{ steps.get-version.outputs.version }}
            
            Auto-generated release from CI/CD pipeline.
            
            ### Build Information
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            - Triggered by: ${{ github.actor }}
          files: |
            target/*.jar
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
